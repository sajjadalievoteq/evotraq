# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - build/**
    - "**/*.g.dart"
  # Large codebase: keep CI/Dart analyzer exit 0 on mass stylistic / transitional
  # Flutter deprecations until migrated file-by-file (withOpacity→withValues,
  # DropdownButtonFormField value→initialValue, etc.).
  errors:
    # Transitional Flutter / style (migrate gradually).
    deprecated_member_use: ignore
    use_super_parameters: ignore
    unnecessary_to_list_in_spreads: ignore
    constant_identifier_names: ignore
    dangling_library_doc_comments: ignore
    prefer_const_constructors_in_immutables: ignore
    unnecessary_brace_in_string_interps: ignore
    avoid_print: ignore
    use_build_context_synchronously: ignore
    library_private_types_in_public_api: ignore
    unnecessary_underscores: ignore
    sort_child_properties_last: ignore
    prefer_final_fields: ignore
    # Warnings treated as silenced until cleaned repo-wide (default `dart analyze` is fatal on warnings).
    unused_import: ignore
    unused_local_variable: ignore
    unused_element: ignore
    unused_field: ignore
    invalid_null_aware_operator: ignore
    unnecessary_null_comparison: ignore
    dead_null_aware_expression: ignore
    dead_code: ignore
    duplicate_import: ignore
    override_on_non_overriding_member: ignore

linter:
  rules:
    # avoid_print: false  # Uncomment to disable the `avoid_print` rule
    # prefer_single_quotes: true  # Uncomment to enable the `prefer_single_quotes` rule
