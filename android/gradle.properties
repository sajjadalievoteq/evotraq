org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dkotlin.daemon.jvm.options="-Xmx2048M"
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true
android.useAndroidX=true
android.enableJetifier=true
android.nonTransitiveRClass=false
org.gradle.warning.mode=all
org.gradle.daemon=true
# Windows specific optimization
kotlin.incremental=true
# Fix for bcprov-jdk18on Java 21 compatibility
android.jetifier.ignorelist=bcprov-jdk18on
# Fix for MLKit resources issue
android.enableR8=true
android.nonFinalResIds=false
