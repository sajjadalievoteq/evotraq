name: traqtrace_app
description: "GS1-compliant track and trace system for pharmaceutical products"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State management

  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  
  # Network and API
  dio: ^5.9.0
  json_annotation: ^4.9.0
  web_socket_channel: ^3.0.0
  
  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^10.0.0
  
  # UI components
  flutter_svg: ^2.2.1
  flutter_form_builder: ^10.2.0
  form_builder_validators: ^11.2.0
  
  # Navigation
  go_router: ^17.2.3
  
  # Utils
  intl: ^0.20.2
  crypto: ^3.0.7
  url_launcher: ^6.3.0
  uuid: ^4.5.1
  flutter_markdown: ^0.7.5
  path_provider: ^2.1.5
  path: ^1.9.1
  universal_html: ^2.2.4
  
  # Charts and Data Visualization
  fl_chart: ^1.1.1
  
  # Camera / barcode scanning (Web + Android + iOS)
  mobile_scanner: ^7.2.1
  
  # Maps
  flutter_map: ^8.0.0
  latlong2: ^0.9.1
  get_it: ^9.2.1
  shimmer: ^3.0.0
  world_countries: ^4.2.0
  file_picker: ^11.0.2
  http_parser: ^4.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.1
  mockito: ^5.6.4
  
  # Testing
  bloc_test: ^10.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/images/logo/
  fonts:
    - family: Nekst
      fonts:
        - asset: assets/fonts/nekst/Nekst-Light.ttf
          weight: 300
        - asset: assets/fonts/nekst/Nekst-Medium.ttf
          weight: 500
        - asset: assets/fonts/nekst/Nekst-SemiBold.ttf
          weight: 600
